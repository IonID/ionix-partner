<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22E3C6"/>
      <stop offset="1" stop-color="#00B7FF"/>
    </radialGradient>
    <linearGradient id="orbit" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22E3C6"/>
      <stop offset="1" stop-color="#00B7FF"/>
    </linearGradient>
  </defs>
  <!-- centered at 32,32 -->
  <g transform="translate(32,32)">
    <!-- outer orbit ring (tilted) -->
    <ellipse cx="0" cy="0" rx="24" ry="9" fill="none" stroke="url(#orbit)" stroke-width="1.6" opacity="0.65" transform="rotate(-22)"/>
    <!-- inner orbit ring (counter-tilted) -->
    <ellipse cx="0" cy="0" rx="17" ry="6.5" fill="none" stroke="url(#orbit)" stroke-width="1.2" opacity="0.35" transform="rotate(28)"/>
    <!-- orbiting partner dots on outer orbit -->
    <g transform="rotate(-22)">
      <circle cx="23" cy="-8" r="2.6" fill="#22E3C6"/>
      <circle cx="-22" cy="7.5" r="2.2" fill="#00B7FF"/>
    </g>
    <!-- smaller dot on inner orbit -->
    <g transform="rotate(28)">
      <circle cx="16" cy="5.5" r="1.8" fill="#22E3C6" opacity="0.85"/>
    </g>
    <!-- core halo -->
    <circle cx="0" cy="0" r="10" fill="none" stroke="#22E3C6" stroke-width="0.6" opacity="0.45"/>
    <!-- core -->
    <circle cx="0" cy="0" r="6.5" fill="url(#core)"/>
  </g>
</svg>
