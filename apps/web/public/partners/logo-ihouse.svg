<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 460" width="520" height="460">

  <!-- Roof — left slope -->
  <line x1="22" y1="205" x2="260" y2="44" stroke="#1a1a1a" stroke-width="28" stroke-linecap="square"/>
  <!-- Roof — right slope -->
  <line x1="260" y1="44" x2="498" y2="205" stroke="#1a1a1a" stroke-width="28" stroke-linecap="square"/>

  <!-- Chimney (solid rectangle on left slope, above roof line) -->
  <!-- At x=148 on left slope: y = 205 + (148-22)/(260-22)*(44-205) = 205 + (126/238)*(-161) ≈ 97 -->
  <rect x="135" y="36" width="28" height="72" fill="#1a1a1a"/>

  <!-- Apple-like icon below the peak -->
  <!-- Leaf/stem -->
  <path fill="#1a1a1a"
    d="M 268,118 C 268,118 280,100 294,108 C 282,120 268,118 268,118 Z"/>
  <!-- Apple body: two top lobes + body + bite on right -->
  <path fill="#1a1a1a"
    d="M 260,128
       C 246,128 234,122 232,108
       C 220,112 214,126 214,142
       C 214,172 234,196 252,196
       C 258,196 264,193 268,190
       C 272,193 278,196 284,196
       C 302,196 322,172 322,142
       C 322,126 316,112 304,108
       C 302,122 290,128 276,128
       C 271,124 266,126 260,128 Z"/>
  <!-- Bite (white circle on right side) -->
  <circle cx="326" cy="138" r="20" fill="white"/>

  <!-- Curved arc / ground line -->
  <path fill="none" stroke="#1a1a1a" stroke-width="20" stroke-linecap="round"
    d="M 8,302 Q 260,278 512,302"/>

  <!-- iHouse text -->
  <text x="260" y="400"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="86"
    fill="#1a1a1a">iHouse</text>
</svg>
