<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 297 72" width="297" height="72">
  <defs>
    <radialGradient id="coreL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </radialGradient>
    <linearGradient id="orbitGL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <style>
      .wm { font-family: 'Sora', 'Segoe UI', sans-serif; font-weight: 700; letter-spacing: -0.5px; }
      .bd { font-family: 'JetBrains Mono', 'Consolas', monospace; font-weight: 500; letter-spacing: 2px; }
    </style>
  </defs>

  <!-- Orbital icon -->
  <g transform="translate(36,36)">
    <ellipse cx="0" cy="0" rx="30" ry="11" fill="none" stroke="url(#orbitGL)" stroke-width="1.5" opacity="0.85" transform="rotate(-20)"/>
    <ellipse cx="0" cy="0" rx="21" ry="8"  fill="none" stroke="url(#orbitGL)" stroke-width="1.1" opacity="0.50" transform="rotate(25)"/>
    <g transform="rotate(-20)">
      <circle cx="29"  cy="-10" r="2.8" fill="#0D9488"/>
      <circle cx="-28" cy="9"   r="2.2" fill="#0284C7"/>
    </g>
    <g transform="rotate(25)">
      <circle cx="20" cy="7" r="1.8" fill="#0D9488"/>
    </g>
    <circle cx="0" cy="0" r="12"  fill="none" stroke="#0D9488" stroke-width="0.5" opacity="0.55"/>
    <circle cx="0" cy="0" r="7.5" fill="url(#coreL)"/>
  </g>

  <!-- ionix wordmark — dark for light background -->
  <text x="82" y="47" class="wm" font-size="33" fill="#0B1220">ionix</text>

  <!-- PARTENER badge — ends at x=289 -->
  <g transform="translate(197,26)">
    <rect x="0" y="0" width="92" height="21" rx="4" fill="none" stroke="#0D9488" stroke-width="1.0"/>
    <text x="46" y="15" class="bd" font-size="10.5" fill="#0D9488" text-anchor="middle">PARTENER</text>
  </g>
</svg>
