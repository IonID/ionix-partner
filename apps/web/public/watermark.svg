<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <style>
      .wm { font-family: 'Sora', 'Segoe UI', sans-serif; font-weight: 700; letter-spacing: -2px; }
      .bd { font-family: 'JetBrains Mono', 'Consolas', monospace; font-weight: 500; letter-spacing: 8px; }
    </style>
  </defs>
  <!-- diagonal watermark, centered -->
  <g transform="translate(400,400) rotate(-30)" opacity="0.08">
    <!-- icon, large -->
    <g transform="translate(0,-80)">
      <ellipse cx="0" cy="0" rx="120" ry="44" fill="none" stroke="#0B4F5A" stroke-width="4" transform="rotate(-22)"/>
      <ellipse cx="0" cy="0" rx="85" ry="32" fill="none" stroke="#0B4F5A" stroke-width="3" transform="rotate(28)"/>
      <g transform="rotate(-22)">
        <circle cx="117" cy="-40" r="10" fill="#0B4F5A"/>
        <circle cx="-110" cy="36" r="8" fill="#0B4F5A"/>
      </g>
      <g transform="rotate(28)">
        <circle cx="82" cy="28" r="7" fill="#0B4F5A"/>
      </g>
      <circle cx="0" cy="0" r="50" fill="none" stroke="#0B4F5A" stroke-width="2"/>
      <circle cx="0" cy="0" r="30" fill="#0B4F5A"/>
    </g>
    <!-- wordmark below icon -->
    <text x="0" y="120" class="wm" font-size="110" fill="#0B4F5A" text-anchor="middle">ionix</text>
    <text x="0" y="170" class="bd" font-size="22" fill="#0B4F5A" text-anchor="middle">PARTENER</text>
  </g>
</svg>
