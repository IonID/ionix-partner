version: '3.9'

services:
  # ─────────────────────────────────────────────
  #  PostgreSQL Database
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ionix_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ionix_partner}
      POSTGRES_USER: ${POSTGRES_USER:-ionix_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ionix_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ionix_user} -d ${POSTGRES_DB:-ionix_partner}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  #  Redis (sessions & rate-limiting cache)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ionix_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - ionix_network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  #  NestJS API
  # ─────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: ionix_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-ionix_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ionix_partner}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      PORT: 4000
    volumes:
      - ./apps/api:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    ports:
      - "4000:4000"
    networks:
      - ionix_network
    command: npm run start:dev

  # ─────────────────────────────────────────────
  #  Next.js Web
  # ─────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: ionix_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_APP_NAME: "Ionix Partner"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - ionix_network
    command: npm run dev

  # ─────────────────────────────────────────────
  #  Nginx Reverse Proxy
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ionix_nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads_data:/var/uploads:ro
    networks:
      - ionix_network

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  ionix_network:
    driver: bridge
